version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_manage
      POSTGRES_PASSWORD: ai_manage_dev
      POSTGRES_DB: ai_manage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  onlyoffice:
    image: onlyoffice/documentserver:latest
    environment:
      JWT_ENABLED: "false"
    ports:
      - "8088:80"
    volumes:
      - oo_data:/var/log/onlyoffice
      - oo_lib:/var/lib/onlyoffice

volumes:
  pgdata:
  minio_data:
  oo_data:
  oo_lib:
